repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: python -m ruff check .
        language: system
        pass_filenames: false
        types_or: [python, pyi]
      - id: ruff-format
        name: ruff format
        entry: python -m ruff format --check .
        language: system
        pass_filenames: false
        types_or: [python, pyi]
      - id: mypy
        name: mypy
        entry: python -m mypy .
        language: system
        pass_filenames: false
        types_or: [python, pyi]

